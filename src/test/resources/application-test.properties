spring.datasource.url=jdbc:h2:mem:kataria_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false
spring.mail.host=localhost
spring.mail.port=2525
jwt.secret=test-secret-key-must-be-at-least-32-characters-long
jwt.expiration=3600000
logging.level.root=WARN
logging.level.com.katariastoneworld.apis=INFO
